[os]
disabled = false
style = "bg:red fg:crust"

[directory]
style = "bg:peach fg:crust"

read_only_style = "bg:peach fg:crust"
format = "[ $path ]($style)[$read_only ]($read_only_style)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music" = "¾░ØÜ "
"Pictures" = "’ĆŠ "
"Developer" = "¾░▓ŗ "

[git_branch]
symbol = "’Éś"
style = "bg:yellow"
format = '[[ $symbol $branch ](fg:crust bg:yellow)]($style)'
ignore_branches = ['main', 'master']
ignore_bare_repo = true

[git_status]
style = "bg:yellow"
format = '[[($all_status$ahead_behind )](fg:crust bg:yellow)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:lavender"
format = '[[ ’É║ $time ](fg:crust bg:lavender)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[ŌØ»](bold fg:green)'
error_symbol = '[Ō£ś](bold fg:red)'
vimcmd_symbol = '[ŌØ«](bold fg:green)'
vimcmd_replace_one_symbol = '[ŌØ«](bold fg:lavender)'
vimcmd_replace_symbol = '[ŌØ«](bold fg:lavender)'
vimcmd_visual_symbol = '[ŌØ«](bold fg:yellow)'

[cmd_duration]
show_milliseconds = true
format = "Ņ½┤ in $duration "
style = "bg:lavender"
disabled = false
show_notifications = true
min_time = 10_000
min_time_to_notify = 45_000

[kubernetes]
disabled  = false
style   = 'bg:sapphire fg:crust'
format = '[$symbol$context( \($namespace\))]($style)'
contexts = [
  { context_pattern = "k3d-.*", symbol = "~ŌśĖ " },
]

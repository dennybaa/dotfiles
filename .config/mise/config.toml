[settings]
disable_backends = ["asdf"]

[plugins]
fnox-env = "https://github.com/jdx/mise-env-fnox"

[env]
# _.fnox-env = { tools = true }
MISE_GITHUB_TOKEN = { value = "{{ exec(command='get-local-secret github-public-token || true') }}" }
KIND_EXPERIMENTAL_PROVIDER = "podman"

[tools]
caddy = "latest"
cloudflared = "latest"
cue = "latest"
fnox = "latest"
go = "1.26"
jq = "latest"
just = "latest"
k3d = "latest"
kcl = "latest"
kind = "latest"
krew = "latest"
kubectl = "latest"
node = "24"
yq = "latest"
zoxide = "latest"
